<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toinwtu</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --accent-red: #990000;
            --button-bg: #0a0a0a;
            --text-white: #d1d1d1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'MedievalSharp', cursive;
            image-rendering: pixelated;
        }

        /* --- ПОМЕХИ --- */
        .noise {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/Noise_6_2000.png');
            opacity: 0.09; z-index: 150; pointer-events: none;
            animation: noiseAnim 0.1s steps(2) infinite;
        }

        @keyframes noiseAnim {
            0% { transform: translate(0,0); }
            100% { transform: translate(-1%, 1%); }
        }

        .vhs-scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(255, 255, 255, 0.03) 50%, transparent 100%);
            background-size: 100% 8px; z-index: 151; pointer-events: none;
            animation: scanlinesMove 10s linear infinite;
        }

        @keyframes scanlinesMove { from { background-position: 0 0; } to { background-position: 0 100%; } }

        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 180px rgba(0,0,0,0.9); z-index: 152; pointer-events: none;
        }

        #global-glitch {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; z-index: 200; opacity: 0.1; pointer-events: none;
        }

        /* --- HUD --- */
        .vhs-data { position: fixed; top: 20px; left: 20px; z-index: 160; font-family: 'Courier New', monospace; opacity: 0.6; font-size: 14px; }
        .audio-toggle { 
            position: fixed; top: 20px; right: 20px; z-index: 160; font-family: 'Courier New', monospace;
            font-size: 12px; background: transparent; border: 1px solid #222; padding: 5px 10px; color: white; cursor: pointer; opacity: 0.6;
        }

        /* --- КОНТЕНТ С ЛЕГКИМ БЛЮРОМ --- */
        .content-layer {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nickname {
            font-family: 'UnifrakturCook', cursive;
            font-size: clamp(4rem, 15vw, 8.5rem);
            color: var(--accent-red);
            text-shadow: 0 0 25px var(--accent-red);
            transition: 0.5s;
            letter-spacing: -2px;
            margin-bottom: 5px;
            text-transform: lowercase;
            filter: blur(1.5px); /* Умеренный блюр для ника */
        }

        .nickname:hover { filter: blur(0px); text-shadow: 0 0 40px var(--accent-red), 0 0 5px white; }

        .ambient-bar { 
            width: 200px; height: 2px; background: var(--accent-red); 
            margin: 0 auto 40px auto; box-shadow: 0 0 20px 4px var(--accent-red); 
            filter: blur(2px); opacity: 0.7; 
        }

        /* КНОПКИ С МИНИМАЛЬНЫМ БЛЮРОМ */
        .links-container { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 12px; max-width: 800px; padding: 0 20px;
            filter: blur(0.8px); /* Почти незаметный блюр */
        }
        
        .link-btn {
            background: var(--button-bg); color: #777; text-decoration: none; 
            padding: 12px 18px; font-size: 0.8rem; border: 1px solid #151515; 
            transition: 0.2s; min-width: 140px; text-transform: uppercase;
        }
        
        .link-btn:hover { color: var(--text-white); border-color: var(--accent-red); filter: blur(0px); }

        #cursor { 
            width: 10px; height: 10px; background: var(--accent-red); position: fixed; 
            pointer-events: none; z-index: 9999; transform: rotate(45deg); 
            box-shadow: 0 0 10px var(--accent-red); 
        }

        @media (max-width: 600px) { 
            .links-container { display: grid; grid-template-columns: 1fr 1fr; width: 95%; filter: blur(0.6px); } 
            #cursor { display: none; } 
            .nickname { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

    <div id="global-glitch"></div>
    <div class="noise"></div>
    <div class="vhs-scanlines"></div>
    <div class="vignette"></div>
    
    <div class="vhs-data" id="vhs-clock"></div>
    <button class="audio-toggle" id="audio-btn">AMBIENT: OFF</button>
    <div id="cursor"></div>

    <div class="content-layer">
        <h1 class="nickname">toinwtu</h1>
        <div class="ambient-bar"></div>

        <nav class="links-container">
            <a href="https://open.spotify.com/artist/4RBrmX9POPcj2OKXfeoziF?si=2Vb1BShLTsyQ7rwkBtzrJQ" target="_blank" class="link-btn" data-value="Spotify">Spotify</a>
            <a href="https://music.apple.com/tr/artist/toinwtu/1678068316" target="_blank" class="link-btn" data-value="Apple Music">Apple Music</a>
            <a href="https://music.yandex.ru/artist/18960562?utm_source=web&utm_medium=copy_link" target="_blank" class="link-btn" data-value="Yandex Music">Yandex</a>
            <a href="https://soundcloud.com/toinwtu-music?ref=clipboard&p=i&c=0&si=2D7E830DF6E7402B9649F666EB21C1D4&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" target="_blank" class="link-btn" data-value="SoundCloud">SoundCloud</a>
            <a href="https://www.youtube.com/channel/UCPbx5snYNq4V01RgidKUCqw" target="_blank" class="link-btn" data-value="YouTube Music">YT Music</a>
            <a href="https://www.youtube.com/@toinwtu" target="_blank" class="link-btn" data-value="YouTube">YouTube</a>
            <a href="https://t.me/toinwtu" target="_blank" class="link-btn" data-value="Telegram">Telegram</a>
            <a href="https://www.instagram.com/toinwtu?igsh=MW4yNnJ4NHVwbHZrcQ%3D%3D&utm_source=qr" target="_blank" class="link-btn" data-value="Instagram">Instagram</a>
            <a href="https://www.tiktok.com/@toinwtu.mp3?_r=1&_t=ZS-94cyTRYi7x1" target="_blank" class="link-btn" data-value="TikTok">TikTok</a>
            <a href="https://genius.com/artists/Toinwtu08" target="_blank" class="link-btn" data-value="Genius">Genius</a>
        </nav>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const date = months[now.getMonth()] + ". " + now.getDate() + " " + now.getFullYear();
            document.getElementById('vhs-clock').innerHTML = date + "<br>PLAY ▶ " + time;
        }
        setInterval(updateClock, 1000); updateClock();

        const glitchLayer = document.getElementById('global-glitch');
        function triggerGlitch() {
            setTimeout(() => {
                glitchLayer.style.display = 'block';
                setTimeout(() => { glitchLayer.style.display = 'none'; triggerGlitch(); }, 60);
            }, Math.random() * 8000 + 3000);
        }
        triggerGlitch();

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let noiseSource = null;
        function createBrownNoise() {
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            let lastOut = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 4;
            }
            const node = audioCtx.createBufferSource();
            node.buffer = buffer; node.loop = true;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.07;
            node.connect(gain); gain.connect(audioCtx.destination);
            return node;
        }

        document.getElementById('audio-btn').addEventListener('click', function() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!noiseSource) {
                noiseSource = createBrownNoise(); noiseSource.start();
                this.innerText = "AMBIENT: ON"; this.style.color = "var(--accent-red)";
            } else {
                noiseSource.stop(); noiseSource = null;
                this.innerText = "AMBIENT: OFF"; this.style.color = "white";
            }
        });

        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 5 + 'px';
            cursor.style.top = e.clientY - 5 + 'px';
        });

        const letters = "†‡XVO□Δ01";
        document.querySelectorAll('.link-btn').forEach(button => {
            let interval = null;
            button.onmouseenter = event => {
                let iteration = 0; clearInterval(interval);
                interval = setInterval(() => {
                    event.target.innerText = event.target.innerText.split("")
                        .map((l, i) => i < iteration ? event.target.dataset.value[i] : letters[Math.floor(Math.random()*9)])
                        .join("");
                    if(iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1/2;
                }, 40);
            };
        });
    </script>
</body>
</html>
