<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toinwtu | PS1 Analog Station V2</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --accent-red: #990000; /* Яркий красный */
            --button-bg: #0a0a0a;
            --text-white: #d1d1d1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Основной шрифт для всего сайта */
            font-family: 'MedievalSharp', cursive;
            image-rendering: pixelated;
        }

        /* --- Эффекты Глитча и Шума --- */
        #global-glitch {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; z-index: 200; opacity: 0.12; pointer-events: none;
        }

        .noise {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/Noise_6_2000.png');
            opacity: 0.07; z-index: 150; pointer-events: none;
            animation: noiseAnim 0.15s steps(2) infinite;
        }

        @keyframes noiseAnim { 0% { transform: translate(0,0); } 100% { transform: translate(-2%, 2%); } }

        .vhs-scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(255, 255, 255, 0.02) 50%, transparent 100%);
            background-size: 100% 12px; z-index: 151; pointer-events: none;
            animation: scanlinesMove 15s linear infinite;
        }

        @keyframes scanlinesMove { from { background-position: 0 0; } to { background-position: 0 100%; } }

        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 180px rgba(0,0,0,0.95); z-index: 152; pointer-events: none;
        }

        .vhs-data {
            position: fixed; top: 20px; left: 20px; font-family: 'Courier New', monospace;
            font-size: 14px; color: var(--text-white); z-index: 160; opacity: 0.6;
        }

        .audio-toggle {
            position: fixed; top: 20px; right: 20px; font-family: 'Courier New', monospace;
            font-size: 12px; color: var(--text-white); background: transparent;
            border: 1px solid #222; padding: 5px 10px; z-index: 160; opacity: 0.4; transition: 0.3s;
        }
        .audio-toggle:hover { opacity: 1; border-color: var(--accent-red); color: var(--accent-red); }

        #cursor { width: 10px; height: 10px; background: var(--accent-red); position: fixed; pointer-events: none; z-index: 9999; transform: rotate(45deg); box-shadow: 0 0 10px var(--accent-red); }

        /* --- Контент (Никнейм) --- */
        .container { position: relative; z-index: 10; text-align: center; }

        .nickname-wrap { display: inline-block; position: relative; margin-bottom: 5px; }
        
        .nickname {
            /* ВОССТАНОВЛЕННЫЙ ГОТИЧЕСКИЙ ШРИФТ */
            font-family: 'UnifrakturCook', cursive;
            /* ВОССТАНОВЛЕННЫЙ РАЗМЕР И ЦВЕТ */
            font-size: clamp(4.5rem, 15vw, 8rem); /* Ещё больше */
            color: var(--accent-red); /* Снова КРАСНЫЙ */
            text-transform: lowercase;
            
            /* ВОССТАНОВЛЕННОЕ СВЕЧЕНИЕ (Глухой красный блюр) */
            filter: blur(2px);
            text-shadow: 0 0 25px var(--accent-red);
            
            /* ВОССТАНОВЛЕННАЯ ПЛАВНОСТЬ */
            transition: all 0.6s ease-in-out;
            letter-spacing: -2px;
        }

        .
        nickname-wrap:hover .nickname {
            /* Плавное "оживление" при наведении */
            filter: blur(0px);
            transform: scale(1.02);
            /* Усиливаем свечение */
            text-shadow: 0 0 35px var(--accent-red), 0 0 5px white;
        }

        .ambient-bar { 
            width: 250px; height: 2px; 
            background: var(--accent-red); 
            margin: 0 auto 50px auto; 
            box-shadow: 0 0 20px 4px var(--accent-red); 
            filter: blur(3px); 
            opacity: 0.7; 
        }

        /* --- Кнопки Ссылок --- */
        .links-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; max-width: 800px; }
        
        .link-btn {
            background: var(--button-bg); color: #777; text-decoration: none; padding: 12px 18px; font-size: 0.85rem;
            border: 1px solid #151515; transition: all 0.1s steps(2); min-width: 140px; text-transform: uppercase;
        }
        
        .link-btn:hover { 
            color: var(--text-white); border-color: var(--accent-red); 
            transform: translateY(-2px); box-shadow: 4px 4px 0px #400; 
        }

        /* --- Футер --- */
        .status-bar { position: fixed; bottom: 50px; font-family: 'Courier New', monospace; font-size: 11px; color: var(--accent-red); letter-spacing: 2px; opacity: 0.6; }
        footer { position: fixed; bottom: 20px; font-size: 10px; opacity: 0.25; font-family: 'Courier New', monospace; }

        @media (max-width: 600px) { 
            .links-container { display: grid; grid-template-columns: 1fr 1fr; } 
            #cursor, .vhs-data, .audio-toggle, .vhs-scanlines { display: none; } 
            * { cursor: auto; } 
        }
    </style>
</head>
<body>

    <div id="global-glitch"></div>
    <div class="noise"></div>
    <div class="vhs-scanlines"></div>
    <div class="vignette"></div>
    
    <div class="vhs-data" id="vhs-clock"></div>
    <button class="audio-toggle" id="audio-btn">AMBIENT: OFF</button>
    
    <div id="cursor"></div>

    <div class="container">
        <div class="nickname-wrap">
            <h1 class="nickname">toinwtu</h1>
        </div>
        <div class="ambient-bar"></div>

        <nav class="links-container">
            <a href="https://open.spotify.com/artist/4RBrmX9POPcj2OKXfeoziF?si=2Vb1BShLTsyQ7rwkBtzrJQ" target="_blank" class="link-btn" data-value="Spotify">Spotify</a>
            <a href="https://music.apple.com/tr/artist/toinwtu/1678068316" target="_blank" class="link-btn" data-value="Apple Music">Apple Music</a>
            <a href="https://music.yandex.ru/artist/18960562?utm_source=web&utm_medium=copy_link" target="_blank" class="link-btn" data-value="Yandex Music">Yandex</a>
            <a href="https://soundcloud.com/toinwtu-music?ref=clipboard&p=i&c=0&si=2D7E830DF6E7402B9649F666EB21C1D4&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" target="_blank" class="link-btn" data-value="SoundCloud">SoundCloud</a>
            <a href="https://www.youtube.com/channel/UCPbx5snYNq4V01RgidKUCqw" target="_blank" class="link-btn" data-value="YouTube Music">YT Music</a>
            <a href="https://www.youtube.com/@toinwtu" target="_blank" class="link-btn" data-value="YouTube">YouTube</a>
            <a href="https://t.me/toinwtu" target="_blank" class="link-btn" data-value="Telegram">Telegram</a>
            <a href="https://www.instagram.com/toinwtu?igsh=MW4yNnJ4NHVwbHZrcQ%3D%3D&utm_source=qr" target="_blank" class="link-btn" data-value="Instagram">Instagram</a>
            <a href="https://www.tiktok.com/@toinwtu.mp3?_r=1&_t=ZS-94cyTRYi7x1" target="_blank" class="link-btn" data-value="TikTok">TikTok</a>
            <a href="https://genius.com/artists/Toinwtu08" target="_blank" class="link-btn" data-value="Genius">Genius</a>
        </nav>
    </div>

    <div class="status-bar" id="status-text">[SYSTEM: MONITORING]</div>

    <footer>
        &copy; 2026 toinwtu - ANALOG_STATION_V2
    </footer>

    <script>
        // VHS Часы
        function updateClock() {
            const now = new Date();
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const date = months[now.getMonth()] + ". " + now.getDate() + " " + now.getFullYear();
            document.getElementById('vhs-clock').innerHTML = date + "<br>PLAY ▶ " + time;
        }
        setInterval(updateClock, 1000); updateClock();

        // Рандомный Глитч
        const glitchLayer = document.getElementById('global-glitch');
        function triggerGlitch() {
            const delay = Math.random() * 12000 + 6000;
            setTimeout(() => {
                glitchLayer.style.display = 'block';
                setTimeout(() => { glitchLayer.style.display = 'none'; triggerGlitch(); }, 80);
            }, delay);
        }
        triggerGlitch();

        // Низкочастотный гул (Brownian Noise)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let noiseSource = null;

        function createBrownNoise() {
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            let lastOut = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5;
            }
            const node = audioCtx.createBufferSource();
            node.buffer = buffer; node.loop = true;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.05;
            node.connect(gain); gain.connect(audioCtx.destination);
            return node;
        }

        document.getElementById('audio-btn').addEventListener('click', function() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!noiseSource) {
                noiseSource = createBrownNoise(); noiseSource.start();
                this.innerText = "AMBIENT: ON"; this.style.color = "var(--accent-red)";
            } else {
                noiseSource.stop(); noiseSource = null;
                this.innerText = "AMBIENT: OFF"; this.style.color = "var(--text-white)";
            }
        });

        // Статусы
        const statuses = ["[MONITORING]", "[STATUS: AWAKE]", "[SIGNAL: STABLE]", "[VHS_ACTIVE]", "[DECODING...]"];
        let statusIdx = 0;
        setInterval(() => {
            statusIdx = (statusIdx + 1) % statuses.length;
            document.getElementById('status-text').innerText = statuses[statusIdx];
        }, 5000);

        // Курсор
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 5 + 'px';
            cursor.style.top = e.clientY - 5 + 'px';
        });

        // Scramble Эффект
        const letters = "†‡XVO□Δ01";
        document.querySelectorAll('.link-btn').forEach(button => {
            let interval = null;
            button.onmouseenter = event => {
                cursor.style.transform = 'rotate(225deg) scale(2)';
                let iteration = 0; clearInterval(interval);
                interval = setInterval(() => {
                    event.target.innerText = event.target.innerText.split("")
                        .map((l, i) => i < iteration ? event.target.dataset.value[i] : letters[Math.floor(Math.random()*9)])
                        .join("");
                    if(iteration >= event.target.dataset.value.length) clearInterval(interval);
                    iteration += 1/2;
                }, 40);
            };
            button.onmouseleave = () => { cursor.style.transform = 'rotate(45deg) scale(1)'; };
        });
    </script>
</body>
</html>
